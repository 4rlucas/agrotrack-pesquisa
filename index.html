<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AgroTrack Pesquisa</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AgroTrack Pesquisa">
<meta name="theme-color" content="#4ade80">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='38' fill='%230f1117'/><path d='M28 158 L72 48 L116 158' fill='none' stroke='%23f0f2f8' stroke-width='13' stroke-linecap='round' stroke-linejoin='round'/><line x1='44' y1='124' x2='100' y2='124' stroke='%23f0f2f8' stroke-width='10' stroke-linecap='round'/><line x1='112' y1='72' x2='176' y2='72' stroke='%234ade80' stroke-width='13' stroke-linecap='round'/><line x1='144' y1='72' x2='144' y2='158' stroke='%234ade80' stroke-width='13' stroke-linecap='round'/><path d='M144 105 Q166 92 170 68 Q150 67 144 105Z' fill='%2322c55e'/><circle cx='176' cy='58' r='4' fill='%234ade80'/></svg>">
<link rel="apple-touch-icon" href="icon-192.svg">
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
html,body{background:#0f1117!important;color:#f0f2f8!important;}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222534;--surface3:#2a2e3f;
  --accent:#4ade80;--accent2:#22c55e;--accent-light:rgba(74,222,128,.1);
  --text:#f0f2f8;--text2:#8b90a8;--text3:#555a75;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --danger:#f87171;--warn:#fbbf24;--ok:#4ade80;--blue:#60a5fa;--purple:#c084fc;
  --radius:12px;--mono:'DM Mono',monospace;--sans:'Sora',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}html,body{overflow-x:hidden;max-width:100vw;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}
/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{background:var(--surface);border-radius:20px;padding:48px 40px;width:100%;max-width:360px;border:1px solid var(--border2);}
.login-logo{font-size:10px;font-family:var(--mono);letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:8px;}
.login-title{font-size:26px;font-weight:600;margin-bottom:32px;color:var(--text);}
.login-title span{color:var(--accent);}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-family:var(--mono);color:var(--text2);margin-bottom:6px;letter-spacing:1px;}
.field input,.field select{width:100%;padding:12px 14px;border:1px solid var(--border2);border-radius:8px;font-family:var(--sans);font-size:14px;background:var(--surface2);color:var(--text);outline:none;}
.field input:focus,.field select:focus{border-color:var(--accent);}
.field select option{background:var(--surface2);}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:#0a1a0f;border:none;border-radius:8px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;}
.btn-primary:hover{background:var(--accent2);}
.error-msg{color:var(--danger);font-size:12px;margin-top:10px;text-align:center;font-family:var(--mono);}
/* APP LAYOUT */
.app{display:flex;min-height:100vh;}
.sidebar{width:220px;background:var(--surface);padding:24px 0;display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid var(--border);}
.sidebar-logo{font-size:10px;font-family:var(--mono);letter-spacing:3px;color:var(--text3);padding:0 20px 24px;border-bottom:1px solid var(--border);}
.sidebar-logo strong{display:block;font-family:var(--sans);font-size:17px;font-weight:600;color:var(--accent);letter-spacing:0;margin-top:2px;}
.sidebar-user{padding:16px 20px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.sidebar-user-name{font-size:13px;font-weight:500;}
.sidebar-user-role{font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:2px;}
.nav-item{padding:11px 20px;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .15s;border-left:3px solid transparent;}
.nav-item:hover{color:var(--text);background:var(--surface2);}
.nav-item.active{color:var(--accent);background:var(--accent-light);border-left-color:var(--accent);}
.sidebar-bottom{margin-top:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px;}
.btn-logout{width:100%;padding:9px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:var(--sans);font-size:12px;cursor:pointer;}
.btn-logout:hover{background:var(--surface3);color:var(--text);}
.main{flex:1;overflow-y:auto;overflow-x:hidden;min-width:0;}
.page{padding:28px 32px;max-width:1200px;}
.page-header{margin-bottom:24px;}
.page-title{font-size:22px;font-weight:600;}
.page-sub{font-size:13px;font-family:var(--mono);color:var(--text3);margin-top:4px;}
/* CARDS / METRICS */
.cards-grid{display:grid;gap:12px;margin-bottom:20px;}
.cards-grid.cols-4{grid-template-columns:repeat(4,1fr);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;}
.metric-label{font-size:11px;font-family:var(--mono);letter-spacing:1px;color:var(--text3);margin-bottom:8px;}
.metric-value{font-size:26px;font-weight:600;}
.metric-sub{font-size:11px;font-family:var(--mono);color:var(--text3);margin-top:4px;}
.progress-track{height:5px;background:var(--surface3);border-radius:3px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;background:var(--accent);border-radius:3px;transition:width .3s;}
.section-title{font-size:11px;font-family:var(--mono);letter-spacing:2px;color:var(--text3);}
/* FILTROS */
.filtro-tabs{display:flex;flex-wrap:wrap;gap:8px;}
.filtro-tab{padding:7px 13px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:var(--sans);font-size:12px;cursor:pointer;}
.filtro-tab.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);}
/* KANBAN */
.kanban-wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;align-items:start;}
.kanban-wrap.kanban-5{grid-template-columns:repeat(5,1fr);}
.desemp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.desemp-cell{background:var(--surface2);border-radius:8px;padding:12px;text-align:center;}
.desemp-val{font-size:20px;font-weight:600;}
.desemp-lbl{font-size:10px;font-family:var(--mono);color:var(--text3);margin-top:3px;letter-spacing:.5px;}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.kanban-col-header{padding:13px 15px;font-size:11px;font-family:var(--mono);letter-spacing:1.5px;font-weight:500;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.kanban-col-header .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:7px;}
.kanban-col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px;}
.kanban-card{background:var(--surface2);border:1px solid var(--border2);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;}
.kanban-card:hover{border-color:var(--accent);transform:translateY(-1px);}
.kanban-card-title{font-size:13px;font-weight:500;margin:7px 0 8px;line-height:1.4;}
.kanban-card-meta{font-size:11px;font-family:var(--mono);color:var(--text3);display:flex;align-items:center;justify-content:space-between;gap:6px;margin-top:8px;}
.kanban-card-autor{font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
.avatar{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;}
/* BADGES */
.prio-badge{font-size:9px;font-family:var(--mono);padding:2px 7px;border-radius:4px;font-weight:500;letter-spacing:.5px;}
.prio-alta{background:rgba(248,113,113,.15);color:#f87171;}
.prio-media{background:rgba(251,191,36,.15);color:#fbbf24;}
.prio-baixa{background:rgba(74,222,128,.15);color:#4ade80;}
.valid-badge{font-size:10px;font-family:var(--mono);padding:3px 9px;border-radius:5px;font-weight:500;}
.valid-aguardando{background:rgba(251,191,36,.12);color:#fbbf24;}
.valid-validada{background:rgba(74,222,128,.15);color:#4ade80;}
.valid-rafael{background:rgba(192,132,252,.15);color:#c084fc;}
/* BOTÕES DE AÇÃO NO CARD */
.card-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.mini-btn{font-size:10px;font-family:var(--mono);padding:5px 9px;border-radius:6px;border:1px solid var(--border2);background:var(--surface3);color:var(--text2);cursor:pointer;}
.mini-btn:hover{border-color:var(--accent);color:var(--text);}
.mini-btn.go{border-color:rgba(74,222,128,.4);color:var(--accent);}
.mini-btn.val-rafael{border-color:rgba(192,132,252,.4);color:#c084fc;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:26px;width:100%;max-width:460px;max-height:88vh;overflow-y:auto;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;}
.modal-field{margin-bottom:14px;}
.modal-field label{display:block;font-size:11px;font-family:var(--mono);color:var(--text2);margin-bottom:6px;letter-spacing:1px;}
.modal-field input,.modal-field select,.modal-field textarea{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:8px;font-family:var(--sans);font-size:14px;background:var(--surface2);color:var(--text);outline:none;box-sizing:border-box;}
.modal-field textarea{min-height:74px;resize:vertical;}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;}
.btn-ghost{padding:11px 18px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:var(--sans);font-size:13px;cursor:pointer;}
.btn-save{padding:11px 20px;background:var(--accent);color:#0a1a0f;border:none;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;}
.btn-danger{padding:11px 18px;background:rgba(248,113,113,.12);border:1px solid rgba(248,113,113,.3);border-radius:8px;color:var(--danger);font-family:var(--sans);font-size:13px;cursor:pointer;}
.btn-edit{padding:11px 18px;background:var(--surface2);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;cursor:pointer;}
.btn-edit:hover{border-color:var(--accent);color:var(--accent);}
/* TIMELINE */
.timeline{margin-top:14px;border-top:1px solid var(--border);padding-top:14px;}
.tl-item{display:flex;gap:10px;font-size:12px;margin-bottom:10px;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);margin-top:5px;flex-shrink:0;}
.tl-text{color:var(--text2);}
.tl-time{font-family:var(--mono);font-size:10px;color:var(--text3);}
/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--surface3);border:1px solid var(--border2);color:var(--text);padding:12px 22px;border-radius:10px;font-size:13px;font-family:var(--mono);opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;}
.toast.show{opacity:1;}
.empty-col{text-align:center;padding:16px;color:var(--text3);font-size:12px;font-family:var(--mono);}
.mobile-topbar{display:none;}
.mobile-nav{display:none;}
/* RESPONSIVO */
@media(max-width:920px){
  .kanban-wrap,.kanban-wrap.kanban-5{grid-template-columns:1fr;}
  .desemp-grid{grid-template-columns:repeat(2,1fr);}
  .cards-grid.cols-4{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:760px){
  .app{flex-direction:column;}
  .sidebar{display:none;}
  .mobile-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
  .mobile-topbar .logo{font-size:15px;font-weight:600;color:var(--accent);}
  .mobile-nav{display:flex;gap:6px;overflow-x:auto;padding:12px 18px;background:var(--surface);border-bottom:1px solid var(--border);}
  .mobile-nav .nav-item{border-left:none;border-radius:8px;padding:8px 14px;white-space:nowrap;background:var(--surface2);}
  .mobile-nav .nav-item.active{background:var(--accent-light);}
  .page{padding:18px 16px;}
  .modal-actions{flex-direction:column-reverse;}
  .modal-actions button{width:100%;}
}
input[type=text],input[type=password],input[type=date],select,textarea{background:var(--surface2)!important;color:var(--text)!important;}
/* DROPDOWN RESPONSAVEIS */
.dd-wrap{position:relative;}
.dd-toggle{width:100%;padding:11px 13px;border:1px solid var(--border2);border-radius:8px;background:var(--surface2);color:var(--text);font-family:var(--sans);font-size:14px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;gap:8px;}
.dd-toggle.open{border-color:var(--accent);border-radius:8px 8px 0 0;}
.dd-toggle span.dd-val{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dd-toggle .dd-arrow{color:var(--text2);flex-shrink:0;transition:transform .15s;}
.dd-toggle.open .dd-arrow{transform:rotate(180deg);color:var(--accent);}
.dd-list{border:1px solid var(--accent);border-top:none;border-radius:0 0 8px 8px;background:var(--surface);overflow:hidden;}
.dd-opt{display:flex;align-items:center;gap:9px;padding:10px 13px;cursor:pointer;}
.dd-opt:hover{background:var(--surface2);}
.dd-opt.divider{border-bottom:1px solid var(--border);}
.dd-check{width:17px;height:17px;border-radius:5px;border:1px solid var(--border2);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#0f1117;}
.dd-opt.on .dd-check{background:var(--accent);border-color:var(--accent);}
.dd-opt-avatar{width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#0f1117;flex-shrink:0;}
.dd-opt-nome{font-size:13px;color:var(--text);}
.dd-opt.todos .dd-opt-nome{color:var(--accent);font-weight:500;}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIG SUPABASE  — TROQUE PELOS SEUS DADOS
// ============================================================
var SUPABASE_URL = 'https://ftqhdksoinmtedmrighu.supabase.co';
var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0cWhka3NvaW5tdGVkbXJpZ2h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMzMDczNjksImV4cCI6MjA5ODg4MzM2OX0.fdvxZ_Nx79DWkUgKkhT9dLpS_AdoCCwLP8A8mGeE5UA';
var sb = null;
try { sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY); } catch(e){ console.warn('Supabase não configurado', e); }

// ============================================================
// USUÁRIOS  — TROQUE PELOS NOMES REAIS DA EQUIPE DE PESQUISA
// role: 'gestora' | 'funcionaria' | 'rafael'
// ============================================================
var USUARIOS = {
  'gestora':      {senha:'gestora123',   role:'gestora',     nome:'Gestora',      cor:'#4ade80', corBg:'rgba(74,222,128,.15)'},
  'loren': {senha:'loren123',      role:'funcionaria', nome:'Loren',cor:'#60a5fa', corBg:'rgba(96,165,250,.15)'},
  'ana': {senha:'ana123',      role:'funcionaria', nome:'Ana Clara',cor:'#c084fc', corBg:'rgba(192,132,252,.15)'},
  'helena': {senha:'helena123',      role:'funcionaria', nome:'Helena',cor:'#fb923c', corBg:'rgba(251,146,60,.15)'},
  'rafael':       {senha:'rafael123',    role:'rafael',      nome:'Rafael',       cor:'#38bdf8', corBg:'rgba(56,189,248,.15)'},
};

// Status do quadro da equipe
var STATUS = {
  pendente:      {label:'Pendente',      cor:'#8b90a8'},
  em_pausa:      {label:'Em Pausa',      cor:'#fbbf24'},
  em_andamento:  {label:'Em Andamento',  cor:'#60a5fa'},
  concluida:     {label:'Concluída',     cor:'#4ade80'},
};
var STATUS_ORDEM = ['pendente','em_pausa','em_andamento','concluida'];
var PRIORIDADES = {alta:'Alta', media:'Média', baixa:'Baixa'};

// ============================================================
// STATE
// ============================================================
var state = {
  tela:'login', usuario:null, role:null,
  pagina:'quadro',          // quadro | validacao
  demandas:[], historico:[], carregado:false,
  filtroStatus:'todos', filtroResp:'todos',
  modalNova:false, modalData:{},
  cardAberto:null, editData:null,
};

// ============================================================
// HELPERS
// ============================================================
function funcionarias(){ return Object.keys(USUARIOS).filter(function(k){return USUARIOS[k].role==='funcionaria';}); }
function u(login){ return USUARIOS[login] || {nome:login, cor:'#8b90a8', corBg:'rgba(139,144,168,.15)'}; }
function iniciais(nome){ return nome.split(' ').map(function(w){return w[0];}).slice(0,2).join('').toUpperCase(); }
function fmtData(d){ if(!d)return'—'; var dt=new Date(d); return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0'); }
function fmtDataHora(d){ var dt=new Date(d); return String(dt.getDate()).padStart(2,'0')+'/'+String(dt.getMonth()+1).padStart(2,'0')+'/'+dt.getFullYear()+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0'); }
function esc(s){ return String(s==null?'':s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var _toastT;
function showToast(msg){
  var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(_toastT); _toastT=setTimeout(function(){t.classList.remove('show');},2200);
}

// ============================================================
// SUPABASE — carregar e salvar
// ============================================================
async function carregarDemandas(){
  if(!sb){ showToast('Configure o Supabase'); return; }
  try{
    var res = await sb.from('demandas').select('*').order('criado_em',{ascending:false});
    var his = await sb.from('demanda_historico').select('*').order('em',{ascending:true});
    state.demandas = res.data || [];
    state.historico = his.data || [];
    state.carregado = true;
  }catch(e){ console.warn(e); showToast('Erro ao carregar'); }
}

// Recarrega dados vindos de outra janela/pessoa.
// Só re-renderiza se NÃO houver modal aberto, pra não apagar o que a pessoa digita.
var _rtChannel=null;
async function recarregarSilencioso(){
  if(state.tela!=='app') return;
  await carregarDemandas();
  var modalAberto = state.modalNova || state.cardAberto || state.editData;
  if(!modalAberto){ render(); }
}

function iniciarRealtime(){
  if(!sb) return;
  try{
    if(_rtChannel){ sb.removeChannel(_rtChannel); }
    _rtChannel = sb.channel('agrotrack-pesquisa-rt')
      .on('postgres_changes', {event:'*', schema:'public', table:'demandas'}, function(){ recarregarSilencioso(); })
      .on('postgres_changes', {event:'*', schema:'public', table:'demanda_historico'}, function(){ recarregarSilencioso(); })
      .subscribe();
  }catch(e){ console.warn('realtime',e); }
}

// Rede de segurança: ao voltar o foco na aba, recarrega (caso o realtime caia).
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible') recarregarSilencioso();
});

async function logHistorico(demandaId, tipo, de, para){
  if(!sb)return;
  try{ await sb.from('demanda_historico').insert({demanda_id:demandaId, tipo:tipo, de:de, para:para, autor:state.usuario}); }
  catch(e){ console.warn('hist',e); }
}

async function criarDemanda(d, silencioso){
  if(!sb){ showToast('Configure o Supabase'); return; }
  var row = {
    titulo:d.titulo, descricao:d.descricao||'', responsavel:d.responsavel,
    prioridade:d.prioridade||'media', status:'pendente', enviada:false,
    para_gestora: d.para_gestora||false, validado_rafael:false,
    prazo:d.prazo||null, criado_por:state.usuario
  };
  var res = await sb.from('demandas').insert(row).select().single();
  if(res.error){ showToast('Erro ao criar'); console.warn(res.error); return; }
  await logHistorico(res.data.id, 'criada', null, 'pendente');
  if(!silencioso){ showToast('Demanda criada'); await carregarDemandas(); render(); }
}

async function mudarStatus(id, novo){
  var dem = state.demandas.find(function(x){return x.id===id;});
  if(!dem)return;
  var antigo = dem.status;
  await sb.from('demandas').update({status:novo, atualizado_em:new Date().toISOString()}).eq('id',id);
  await logHistorico(id, 'status', STATUS[antigo].label, STATUS[novo].label);
  await carregarDemandas(); render();
}

async function enviarParaValidacao(id){
  var dem = state.demandas.find(function(x){return x.id===id;});
  if(!dem)return;
  await sb.from('demandas').update({enviada:true, validacao:'aguardando', atualizado_em:new Date().toISOString()}).eq('id',id);
  await logHistorico(id, 'quadro', 'Concluída', 'Enviada para validação');
  showToast('Enviada para validação');
  await carregarDemandas(); render();
}

async function validarLudmila(id){
  await sb.from('demandas').update({validacao:'ludmila', atualizado_em:new Date().toISOString()}).eq('id',id);
  await logHistorico(id, 'validacao', null, 'Validada pela Ludmila');
  showToast('Validada pela Ludmila');
  await carregarDemandas(); render();
}

async function toggleValidadoRafael(id){
  var dem = state.demandas.find(function(x){return x.id===id;});
  if(!dem)return;
  var novo = !dem.validado_rafael;
  await sb.from('demandas').update({validado_rafael:novo, atualizado_em:new Date().toISOString()}).eq('id',id);
  await logHistorico(id, 'validacao', null, novo?'Validada também pelo Rafael':'Validação do Rafael removida');
  showToast(novo?'Validada pelo Rafael':'Validação do Rafael removida');
  await carregarDemandas(); render();
}

async function reabrirValidacao(id){
  // volta pra aguardando e limpa a validação do Rafael também
  await sb.from('demandas').update({validacao:'aguardando', validado_rafael:false, atualizado_em:new Date().toISOString()}).eq('id',id);
  await logHistorico(id, 'validacao', null, 'Reaberta');
  showToast('Reaberta');
  await carregarDemandas(); render();
}

async function voltarParaEquipe(id){
  await sb.from('demandas').update({enviada:false, validacao:'aguardando', validado_rafael:false, atualizado_em:new Date().toISOString()}).eq('id',id);
  await logHistorico(id, 'quadro', 'Validação', 'Concluída');
  showToast('Devolvida ao quadro da equipe');
  await carregarDemandas(); render();
}

async function excluirDemanda(id){
  if(!confirm('Excluir esta demanda? Esta ação não pode ser desfeita.'))return;
  await sb.from('demandas').delete().eq('id',id);
  state.cardAberto=null;
  showToast('Demanda excluída');
  await carregarDemandas(); render();
}

// ============================================================
// RENDER
// ============================================================
function render(){
  var root=document.getElementById('root');
  if(state.tela==='login'){ root.innerHTML=renderLogin(); bindLogin(); return; }
  root.innerHTML=renderApp();
  bindApp();
}

// ---- LOGIN ----
function renderLogin(){
  return '<div class="login-wrap"><div class="login-card">'
    +'<div class="login-logo">Grower Tools</div>'
    +'<div class="login-title">AgroTrack <span>Pesquisa</span></div>'
    +'<div class="field"><label>USUÁRIO</label>'
    +'<select id="l-user"><option value="">— selecione —</option>'
    +Object.keys(USUARIOS).map(function(k){return'<option value="'+k+'">'+esc(USUARIOS[k].nome)+'</option>';}).join('')
    +'</select></div>'
    +'<div class="field"><label>SENHA</label><input type="password" id="l-senha" placeholder="••••••••"></div>'
    +'<button class="btn-primary" id="l-btn">Entrar</button>'
    +'<div class="error-msg" id="l-err"></div>'
    +'</div></div>';
}
function bindLogin(){
  document.getElementById('l-btn').onclick=async function(){
    var login=document.getElementById('l-user').value;
    var senha=document.getElementById('l-senha').value;
    var d=USUARIOS[login];
    if(!d||d.senha!==senha){ document.getElementById('l-err').textContent='Usuário ou senha incorretos.'; return; }
    state.usuario=login; state.role=d.role; state.tela='app';
    state.pagina = d.role==='rafael' ? 'validacao' : 'quadro';
    document.getElementById('root').innerHTML='<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px"><div style="font-size:18px;font-weight:600;color:#4ade80">AgroTrack Pesquisa</div><div style="font-size:13px;font-family:monospace;color:#555a75">Carregando...</div></div>';
    await carregarDemandas(); iniciarRealtime(); render();
  };
  document.getElementById('l-senha').onkeydown=function(e){ if(e.key==='Enter')document.getElementById('l-btn').click(); };
}

// ---- APP SHELL ----
function navItems(){
  var items=[];
  if(state.role!=='rafael') items.push(['quadro','Demandas']);
  if(state.role==='gestora'||state.role==='rafael') items.push(['gestora','Demandas Gestora']);
  if(state.role==='gestora'||state.role==='rafael') items.push(['validacao','Validação Gestora']);
  if(state.role==='gestora') items.push(['desempenho','Desempenho da equipe']);
  return items;
}
function renderApp(){
  var user=u(state.usuario);
  var nav=navItems();
  var navHTML=nav.map(function(p){
    return '<div class="nav-item'+(state.pagina===p[0]?' active':'')+'" onclick="irPara(\''+p[0]+'\')">'+p[1]+'</div>';
  }).join('');
  var content = state.pagina==='validacao' ? renderQuadroValidacao()
              : state.pagina==='desempenho' ? renderDesempenho()
              : state.pagina==='gestora' ? renderQuadroGestora()
              : renderQuadroEquipe();
  return '<div class="app">'
    +'<div class="sidebar">'
      +'<div class="sidebar-logo">Grower Tools<strong>AgroTrack Pesquisa</strong></div>'
      +'<div class="sidebar-user"><div class="sidebar-user-name" style="color:'+user.cor+'">'+esc(user.nome)+'</div><div class="sidebar-user-role">'+roleLabel(state.role)+'</div></div>'
      +navHTML
      +'<div class="sidebar-bottom"><button class="btn-logout" onclick="logout()">Sair</button></div>'
    +'</div>'
    +'<div class="mobile-topbar"><div class="logo">AgroTrack Pesquisa</div><button class="btn-logout" style="width:auto" onclick="logout()">Sair</button></div>'
    +'<div class="mobile-nav">'+navHTML+'</div>'
    +'<div class="main">'+content+'</div>'
    +'</div>'
    +(state.modalNova?renderModalNova():'')
    +(state.cardAberto?renderModalCard():'')
    +(state.editData?renderModalEditar():'');
}
function roleLabel(r){ return r==='gestora'?'Gestora':r==='rafael'?'Validação':'Equipe de Pesquisa'; }

function irPara(p){ state.pagina=p; state.cardAberto=null; state.editData=null; render(); }
function logout(){ try{ if(_rtChannel){ sb.removeChannel(_rtChannel); _rtChannel=null; } }catch(e){} state.tela='login'; state.usuario=null; state.role=null; state.cardAberto=null; state.editData=null; render(); }

// ---- QUADRO 1: EQUIPE ----
function renderQuadroEquipe(){
  var isGestora = state.role==='gestora';
  var isFunc = state.role==='funcionaria';
  // demandas da equipe (exclui as que são da gestora — essas vão pra aba Demandas Gestora)
  var demandas = state.demandas.filter(function(d){return !d.para_gestora;});
  // funcionária só vê as dela
  if(isFunc) demandas = demandas.filter(function(d){return d.responsavel===state.usuario;});

  // filtros (gestora)
  var fStatus=state.filtroStatus, fResp=state.filtroResp;
  var filtradas = demandas.filter(function(d){
    if(fStatus!=='todos' && d.status!==fStatus) return false;
    if(fResp!=='todos' && d.responsavel!==fResp) return false;
    return true;
  });

  // KPIs
  var total=demandas.length;
  var concl=demandas.filter(function(d){return d.status==='concluida';}).length;
  var andam=demandas.filter(function(d){return d.status==='em_andamento';}).length;
  var pct = total? Math.round(concl/total*100) : 0;

  var kpis='<div class="cards-grid cols-4">'
    +metric('TOTAL', total, 'demandas', 'var(--text)')
    +metric('CONCLUÍDAS', concl, 'finalizadas', 'var(--accent)')
    +metric('EM ANDAMENTO', andam, 'em execução', 'var(--blue)')
    +'<div class="card"><div class="metric-label">PROGRESSO</div><div class="metric-value">'+pct+'%</div><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>'
    +'</div>';

  // filtros só pra gestora
  var filtrosHTML='';
  if(isGestora){
    var stTabs=[['todos','Todos',demandas.length]].concat(STATUS_ORDEM.map(function(s){
      return [s, STATUS[s].label, demandas.filter(function(d){return d.status===s;}).length];
    }));
    var stHTML=stTabs.map(function(t){return'<button class="filtro-tab'+(fStatus===t[0]?' active':'')+'" onclick="state.filtroStatus=\''+t[0]+'\';render()">'+t[1]+' ('+t[2]+')</button>';}).join('');
    var rpTabs=[['todos','Todas',demandas.length]].concat(funcionarias().map(function(f){
      return [f, u(f).nome, demandas.filter(function(d){return d.responsavel===f;}).length];
    }));
    var rpHTML=rpTabs.map(function(t){return'<button class="filtro-tab'+(fResp===t[0]?' active':'')+'" onclick="state.filtroResp=\''+t[0]+'\';render()">'+t[1]+' ('+t[2]+')</button>';}).join('');
    filtrosHTML='<div class="card" style="margin-bottom:16px">'
      +'<div style="margin-bottom:12px"><div class="section-title" style="margin-bottom:8px">POR STATUS</div><div class="filtro-tabs">'+stHTML+'</div></div>'
      +'<div><div class="section-title" style="margin-bottom:8px">POR RESPONSÁVEL</div><div class="filtro-tabs">'+rpHTML+'</div></div>'
      +'</div>';
  }

  // kanban: 4 colunas de status + coluna "Em validação" (demandas enviadas)
  var enviadas = filtradas.filter(function(d){return d.enviada;});
  var kanbanCols = STATUS_ORDEM.map(function(st){
    // concluídas que já foram enviadas saem da coluna Concluída (vão pra Em validação)
    var col=filtradas.filter(function(d){return d.status===st && !d.enviada;});
    var items=col.map(function(d){return cardEquipe(d);}).join('') || '<div class="empty-col">Nenhuma demanda</div>';
    return '<div class="kanban-col">'
      +'<div class="kanban-col-header"><span><span class="dot" style="background:'+STATUS[st].cor+'"></span>'+STATUS[st].label.toUpperCase()+'</span><span>'+col.length+'</span></div>'
      +'<div class="kanban-col-body">'+items+'</div></div>';
  });
  // coluna Em validação
  var itemsVal = enviadas.map(function(d){return cardEmValidacao(d);}).join('') || '<div class="empty-col">Nenhuma demanda</div>';
  kanbanCols.push('<div class="kanban-col">'
    +'<div class="kanban-col-header"><span><span class="dot" style="background:#a78bfa"></span>EM VALIDAÇÃO</span><span>'+enviadas.length+'</span></div>'
    +'<div class="kanban-col-body">'+itemsVal+'</div></div>');
  var kanban='<div class="kanban-wrap kanban-5">'+kanbanCols.join('')+'</div>';

  var btnNova = (isGestora||isFunc) ? '<button class="btn-save" onclick="abrirModalNova()">+ Nova demanda</button>' : '';

  return '<div class="page">'
    +'<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">'
      +'<div><div class="page-title">Demandas da equipe</div><div class="page-sub">'+(isFunc?'Minhas demandas':'Visão geral · '+total+' demandas')+'</div></div>'
      +btnNova
    +'</div>'
    +kpis+filtrosHTML+kanban
    +'</div>';
}

function cardEquipe(d){
  var user=u(d.responsavel);
  var isGestora=state.role==='gestora';
  var podeMexer = isGestora || d.responsavel===state.usuario;
  var prazo = d.prazo ? '<span style="color:var(--text3)">📅 '+fmtData(d.prazo)+'</span>' : '';

  // ações de status
  var acoes='';
  if(podeMexer){
    var btns=[];
    STATUS_ORDEM.forEach(function(s){
      if(s!==d.status) btns.push('<button class="mini-btn" onclick="event.stopPropagation();mudarStatus(\''+d.id+'\',\''+s+'\')">'+STATUS[s].label+'</button>');
    });
    acoes='<div class="card-actions">'+btns.join('')+'</div>';
  }
  // envia concluída pra validação: gestora (qualquer) ou a funcionária dona da demanda
  var envio='';
  if(podeMexer && d.status==='concluida' && !d.enviada){
    envio='<div class="card-actions"><button class="mini-btn go" onclick="event.stopPropagation();enviarParaValidacao(\''+d.id+'\')">→ Enviar p/ validação</button></div>';
  }

  return '<div class="kanban-card" onclick="abrirCard(\''+d.id+'\')">'
    +'<span class="prio-badge prio-'+d.prioridade+'">'+PRIORIDADES[d.prioridade].toUpperCase()+'</span>'
    +'<div class="kanban-card-title">'+esc(d.titulo)+'</div>'
    +'<div class="kanban-card-meta">'
      +'<span class="kanban-card-autor" style="background:'+user.corBg+';color:'+user.cor+'"><span class="avatar" style="background:'+user.cor+';color:#0f1117">'+iniciais(user.nome)+'</span>'+esc(user.nome)+'</span>'
      +prazo
    +'</div>'
    +acoes+envio
    +'</div>';
}

// ---- ABA: DEMANDAS GESTORA (gestora e Rafael) ----
function renderQuadroGestora(){
  var isGestora = state.role==='gestora';
  var demandas = state.demandas.filter(function(d){return d.para_gestora;});

  var total=demandas.length;
  var concl=demandas.filter(function(d){return d.status==='concluida';}).length;
  var andam=demandas.filter(function(d){return d.status==='em_andamento';}).length;
  var pct = total? Math.round(concl/total*100) : 0;

  var kpis='<div class="cards-grid cols-4">'
    +metric('TOTAL', total, 'demandas', 'var(--text)')
    +metric('CONCLUÍDAS', concl, 'finalizadas', 'var(--accent)')
    +metric('EM ANDAMENTO', andam, 'em execução', 'var(--blue)')
    +'<div class="card"><div class="metric-label">PROGRESSO</div><div class="metric-value">'+pct+'%</div><div class="progress-track"><div class="progress-fill" style="width:'+pct+'%"></div></div></div>'
    +'</div>';

  var kanban='<div class="kanban-wrap">'+STATUS_ORDEM.map(function(st){
    var col=demandas.filter(function(d){return d.status===st;});
    var items=col.map(function(d){return cardGestora(d);}).join('') || '<div class="empty-col">Nenhuma demanda</div>';
    return '<div class="kanban-col">'
      +'<div class="kanban-col-header"><span><span class="dot" style="background:'+STATUS[st].cor+'"></span>'+STATUS[st].label.toUpperCase()+'</span><span>'+col.length+'</span></div>'
      +'<div class="kanban-col-body">'+items+'</div></div>';
  }).join('')+'</div>';

  // só a gestora cria demanda pra si mesma nesta aba
  var btnNova = isGestora ? '<button class="btn-save" onclick="abrirModalNova(true)">+ Nova demanda</button>' : '';

  return '<div class="page">'
    +'<div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">'
      +'<div><div class="page-title">Demandas Gestora</div><div class="page-sub">Demandas atribuídas à gestora · '+total+' no total</div></div>'
      +btnNova
    +'</div>'
    +kpis+kanban
    +'</div>';
}

function cardGestora(d){
  var isGestora=state.role==='gestora';
  var criador = d.criado_por ? u(d.criado_por).nome : '—';
  // gestora mexe no status; Rafael só visualiza
  var acoes='';
  if(isGestora){
    var btns=[];
    STATUS_ORDEM.forEach(function(s){
      if(s!==d.status) btns.push('<button class="mini-btn" onclick="event.stopPropagation();mudarStatus(\''+d.id+'\',\''+s+'\')">'+STATUS[s].label+'</button>');
    });
    acoes='<div class="card-actions">'+btns.join('')+'</div>';
  }
  var prazo = d.prazo ? '<span style="color:var(--text3)">📅 '+fmtData(d.prazo)+'</span>' : '';
  return '<div class="kanban-card" onclick="abrirCard(\''+d.id+'\')">'
    +'<span class="prio-badge prio-'+d.prioridade+'">'+PRIORIDADES[d.prioridade].toUpperCase()+'</span>'
    +'<div class="kanban-card-title">'+esc(d.titulo)+'</div>'
    +'<div class="kanban-card-meta"><span style="color:var(--text3)">criada por '+esc(criador)+'</span>'+prazo+'</div>'
    +acoes
    +'</div>';
}

// Card na coluna "Em validação" do quadro da equipe (mostra estado, só leitura pra funcionária)
function cardEmValidacao(d){
  var user=u(d.responsavel);
  var badge;
  if(d.validacao==='ludmila'){
    badge='<div style="display:flex;gap:5px;flex-wrap:wrap">'
      +'<span class="valid-badge valid-validada">✓ Validada pela Ludmila</span>'
      +(d.validado_rafael?'<span class="valid-badge valid-rafael">✓ Rafael</span>':'')
      +'</div>';
  }else{
    badge='<span class="valid-badge valid-aguardando">⏳ Aguardando validação</span>';
  }
  return '<div class="kanban-card" onclick="abrirCard(\''+d.id+'\')">'
    +'<span class="prio-badge prio-'+d.prioridade+'">'+PRIORIDADES[d.prioridade].toUpperCase()+'</span>'
    +'<div class="kanban-card-title">'+esc(d.titulo)+'</div>'
    +'<div style="margin:6px 0 8px">'+badge+'</div>'
    +'<div class="kanban-card-meta">'
      +'<span class="kanban-card-autor" style="background:'+user.corBg+';color:'+user.cor+'"><span class="avatar" style="background:'+user.cor+';color:#0f1117">'+iniciais(user.nome)+'</span>'+esc(user.nome)+'</span>'
    +'</div>'
    +'</div>';
}
// ---- ABA: DESEMPENHO DA EQUIPE (só gestora) ----
function renderDesempenho(){
  var fs=funcionarias();
  var linhas = fs.map(function(f){
    var todas = state.demandas.filter(function(d){return d.responsavel===f;});
    var total = todas.length;
    var concluidas = todas.filter(function(d){return d.status==='concluida';}).length;
    var andamento = todas.filter(function(d){return d.status==='em_andamento';}).length;
    var pendentes = todas.filter(function(d){return d.status==='pendente';}).length;
    var pausa = todas.filter(function(d){return d.status==='em_pausa';}).length;
    var pct = total ? Math.round(concluidas/total*100) : 0;
    return {login:f, total:total, concluidas:concluidas, andamento:andamento, pendentes:pendentes, pausa:pausa, pct:pct};
  });

  var gTotal = linhas.reduce(function(a,l){return a+l.total;},0);
  var gConcl = linhas.reduce(function(a,l){return a+l.concluidas;},0);
  var gPct = gTotal ? Math.round(gConcl/gTotal*100) : 0;

  var kpis='<div class="cards-grid cols-4">'
    +metric('EQUIPE', fs.length, 'pessoas', 'var(--text)')
    +metric('DEMANDAS', gTotal, 'no total', 'var(--text)')
    +metric('CONCLUÍDAS', gConcl, 'da equipe', 'var(--accent)')
    +'<div class="card"><div class="metric-label">CONCLUSÃO GERAL</div><div class="metric-value">'+gPct+'%</div><div class="progress-track"><div class="progress-fill" style="width:'+gPct+'%"></div></div></div>'
    +'</div>';

  var cards = linhas.map(function(l){
    var us=u(l.login);
    var corPct = l.pct>=70?'var(--accent)':l.pct>=40?'var(--warn)':'var(--text2)';
    return '<div class="card" style="margin-bottom:12px">'
      +'<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">'
        +'<span class="avatar" style="width:32px;height:32px;font-size:12px;background:'+us.cor+';color:#0f1117">'+iniciais(us.nome)+'</span>'
        +'<div><div style="font-size:15px;font-weight:500;color:'+us.cor+'">'+esc(us.nome)+'</div>'
        +'<div style="font-size:11px;font-family:var(--mono);color:var(--text3)">'+l.total+' demanda'+(l.total===1?'':'s')+'</div></div>'
        +'<div style="margin-left:auto;text-align:right"><div style="font-size:22px;font-weight:600;color:'+corPct+'">'+l.pct+'%</div><div style="font-size:10px;font-family:var(--mono);color:var(--text3)">conclusão</div></div>'
      +'</div>'
      +'<div class="progress-track" style="margin-bottom:14px"><div class="progress-fill" style="width:'+l.pct+'%"></div></div>'
      +'<div class="desemp-grid">'
        +desempCell('Concluídas', l.concluidas, 'var(--accent)')
        +desempCell('Em andamento', l.andamento, 'var(--blue)')
        +desempCell('Pendentes', l.pendentes, 'var(--text2)')
        +desempCell('Em pausa', l.pausa, 'var(--warn)')
      +'</div>'
      +'</div>';
  }).join('');

  return '<div class="page">'
    +'<div class="page-header"><div class="page-title">Desempenho da equipe</div><div class="page-sub">Acompanhamento por funcionária</div></div>'
    +kpis+cards
    +'</div>';
}
function desempCell(label,val,cor){
  return '<div class="desemp-cell"><div class="desemp-val" style="color:'+cor+'">'+val+'</div><div class="desemp-lbl">'+label+'</div></div>';
}

function renderQuadroValidacao(){
  var isGestora=state.role==='gestora';
  var isRafael=state.role==='rafael';
  var demandas=state.demandas.filter(function(d){return d.enviada;});

  var aguardando=demandas.filter(function(d){return d.validacao==='aguardando';});
  var validadas=demandas.filter(function(d){return d.validacao==='ludmila';});
  var comRafael=validadas.filter(function(d){return d.validado_rafael;}).length;

  var kpis='<div class="cards-grid cols-4">'
    +metric('NA VALIDAÇÃO', demandas.length, 'demandas', 'var(--text)')
    +metric('AGUARDANDO', aguardando.length, 'a validar', 'var(--warn)')
    +metric('VALIDADAS', validadas.length, 'pela Ludmila', 'var(--accent)')
    +metric('C/ RAFAEL', comRafael, 'também', 'var(--purple)')
    +'</div>';

  function coluna(titulo, cor, lista){
    var items=lista.map(function(d){return cardValidacao(d,isGestora,isRafael);}).join('') || '<div class="empty-col">Nenhuma demanda</div>';
    return '<div class="kanban-col">'
      +'<div class="kanban-col-header"><span><span class="dot" style="background:'+cor+'"></span>'+titulo+'</span><span>'+lista.length+'</span></div>'
      +'<div class="kanban-col-body">'+items+'</div></div>';
  }
  var kanban='<div class="kanban-wrap" style="grid-template-columns:repeat(2,1fr)">'
    +coluna('AGUARDANDO VALIDAÇÃO','#fbbf24',aguardando)
    +coluna('VALIDADA LUDMILA','#4ade80',validadas)
    +'</div>';

  return '<div class="page">'
    +'<div class="page-header"><div class="page-title">Validação Gestora</div><div class="page-sub">Validação das demandas concluídas</div></div>'
    +kpis+kanban
    +'</div>';
}

function cardValidacao(d,isGestora,isRafael){
  var user=u(d.responsavel);
  var podeValidar = isGestora || isRafael;
  var acoes='';

  if(d.validacao==='aguardando'){
    // só validação da Ludmila (Rafael não valida antes)
    if(podeValidar){
      acoes='<div class="card-actions">'
        +'<button class="mini-btn go" onclick="event.stopPropagation();validarLudmila(\''+d.id+'\')">✓ Validar (Ludmila)</button>'
        +(isGestora?'<button class="mini-btn" onclick="event.stopPropagation();voltarParaEquipe(\''+d.id+'\')">← Voltar p/ equipe</button>':'')
        +'</div>';
    }
  }else{
    // validada pela Ludmila — mostra selos (Ludmila sempre; Rafael se houver)
    var selos='<div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px">'
      +'<span class="valid-badge valid-validada">✓ Ludmila</span>'
      +(d.validado_rafael?'<span class="valid-badge valid-rafael">✓ Rafael</span>':'')
      +'</div>';
    acoes=selos;
    if(podeValidar){
      var btns=[];
      // botão de validar/remover Rafael (mesma cor roxa)
      if(d.validado_rafael){
        btns.push('<button class="mini-btn val-rafael" onclick="event.stopPropagation();toggleValidadoRafael(\''+d.id+'\')">✕ Remover Rafael</button>');
      }else{
        btns.push('<button class="mini-btn val-rafael" onclick="event.stopPropagation();toggleValidadoRafael(\''+d.id+'\')">+ Validar Rafael</button>');
      }
      btns.push('<button class="mini-btn" onclick="event.stopPropagation();reabrirValidacao(\''+d.id+'\')">↩ Reabrir</button>');
      if(isGestora) btns.push('<button class="mini-btn" onclick="event.stopPropagation();voltarParaEquipe(\''+d.id+'\')">← Voltar p/ equipe</button>');
      acoes+='<div class="card-actions">'+btns.join('')+'</div>';
    }
  }

  return '<div class="kanban-card" onclick="abrirCard(\''+d.id+'\')">'
    +'<span class="prio-badge prio-'+d.prioridade+'">'+PRIORIDADES[d.prioridade].toUpperCase()+'</span>'
    +'<div class="kanban-card-title">'+esc(d.titulo)+'</div>'
    +(d.descricao?'<div style="font-size:12px;color:var(--text2);margin-bottom:8px;line-height:1.4">'+esc(d.descricao.slice(0,90))+(d.descricao.length>90?'…':'')+'</div>':'')
    +'<div class="kanban-card-meta"><span class="kanban-card-autor" style="background:'+user.corBg+';color:'+user.cor+'"><span class="avatar" style="background:'+user.cor+';color:#0f1117">'+iniciais(user.nome)+'</span>'+esc(user.nome)+'</span></div>'
    +acoes
    +'</div>';
}

// ---- METRIC HELPER ----
function metric(label,val,sub,cor){
  return '<div class="card"><div class="metric-label">'+label+'</div><div class="metric-value" style="color:'+(cor||'var(--text)')+'">'+val+'</div><div class="metric-sub">'+sub+'</div></div>';
}

// ---- MODAL NOVA DEMANDA ----
// soGestora=true (chamada da aba Demandas Gestora): já vem com a gestora marcada e travada
function abrirModalNova(soGestora){
  state.modalNova=true;
  state.modalData={prioridade:'media', responsaveis: soGestora?['__gestora__']:[], ddAberto:false, soGestora:!!soGestora};
  render();
}
function fecharModalNova(){ state.modalNova=false; render(); }

// lista de opções do dropdown: funcionárias + a gestora (rótulo especial __gestora__)
function opcoesResponsaveis(){
  return funcionarias().concat(['__gestora__']);
}
function nomeResp(login){ return login==='__gestora__' ? 'Gestora' : u(login).nome; }

// resumo do dropdown fechado: vazio->"Equipe" | todas as funcionárias->"Todos" | senão nomes
function resumoResponsaveis(){
  var sel=state.modalData.responsaveis||[];
  var fs=funcionarias();
  if(sel.length===0) return 'Equipe';
  var soFunc = sel.filter(function(x){return x!=='__gestora__';});
  if(soFunc.length===fs.length && sel.indexOf('__gestora__')<0) return 'Todos';
  return sel.map(function(f){return nomeResp(f);}).join(', ');
}
function toggleDropdownResp(){ _capturarCamposModal(); state.modalData.ddAberto=!state.modalData.ddAberto; render(); }
function toggleResp(login){
  _capturarCamposModal();
  var sel=state.modalData.responsaveis||[];
  var i=sel.indexOf(login);
  if(i>=0) sel.splice(i,1); else sel.push(login);
  state.modalData.responsaveis=sel;
  render();
}
function toggleTodos(){
  _capturarCamposModal();
  var fs=funcionarias();
  var sel=state.modalData.responsaveis||[];
  var soFunc = sel.filter(function(x){return x!=='__gestora__';});
  var temGestora = sel.indexOf('__gestora__')>=0;
  // "Todos" marca/desmarca só as funcionárias, preserva a gestora
  if(soFunc.length===fs.length){
    state.modalData.responsaveis = temGestora?['__gestora__']:[];
  }else{
    state.modalData.responsaveis = temGestora ? fs.concat(['__gestora__']) : fs.slice();
  }
  render();
}

function renderModalNova(){
  var d=state.modalData;
  var sel=d.responsaveis||[];
  var fs=funcionarias();
  var soFunc = sel.filter(function(x){return x!=='__gestora__';});
  var todosMarcados = fs.length>0 && soFunc.length===fs.length;
  var prioOpts=Object.keys(PRIORIDADES).map(function(p){return'<option value="'+p+'"'+(d.prioridade===p?' selected':'')+'>'+PRIORIDADES[p]+'</option>';}).join('');

  // dropdown de responsáveis
  var ddList='';
  if(d.ddAberto){
    var optTodos = d.soGestora ? '' : ('<div class="dd-opt todos divider'+(todosMarcados?' on':'')+'" onclick="toggleTodos()">'
      +'<span class="dd-check">'+(todosMarcados?'✓':'')+'</span>'
      +'<span class="dd-opt-nome">Todos</span></div>');
    // se for da aba gestora, só mostra a opção Gestora
    var lista = d.soGestora ? ['__gestora__'] : opcoesResponsaveis();
    var opts=lista.map(function(f){
      var on=sel.indexOf(f)>=0;
      var ehGestora = f==='__gestora__';
      var nome = nomeResp(f);
      var cor = ehGestora ? '#4ade80' : u(f).cor;
      var ini = ehGestora ? 'G' : iniciais(u(f).nome);
      return '<div class="dd-opt'+(on?' on':'')+(ehGestora?' divider':'')+'" onclick="toggleResp(\''+f+'\')">'
        +'<span class="dd-check">'+(on?'✓':'')+'</span>'
        +'<span class="dd-opt-avatar" style="background:'+cor+'">'+ini+'</span>'
        +'<span class="dd-opt-nome">'+esc(nome)+(ehGestora?' (para a gestora)':'')+'</span></div>';
    }).join('');
    ddList='<div class="dd-list">'+optTodos+opts+'</div>';
  }
  var dropdown='<div class="dd-wrap">'
    +'<div class="dd-toggle'+(d.ddAberto?' open':'')+'" onclick="toggleDropdownResp()">'
    +'<span class="dd-val">'+esc(resumoResponsaveis())+'</span>'
    +'<span class="dd-arrow">▾</span></div>'
    +ddList+'</div>';

  var nBtn = sel.length>1 ? ('Criar '+sel.length+' demandas') : 'Criar demanda';
  var titulo_modal = d.soGestora ? 'Nova demanda (gestora)' : 'Nova demanda';

  return '<div class="modal-overlay" onclick="if(event.target===this)fecharModalNova()"><div class="modal">'
    +'<div class="modal-title">'+titulo_modal+'</div>'
    +'<div class="modal-field"><label>TÍTULO</label><input type="text" id="m-titulo" placeholder="Ex: Análise foliar lote soja" value="'+esc(d.titulo||'')+'"></div>'
    +'<div class="modal-field"><label>RESPONSÁVEIS</label>'+dropdown+'</div>'
    +'<div class="modal-field"><label>PRIORIDADE</label><select id="m-prio">'+prioOpts+'</select></div>'
    +'<div class="modal-field"><label>PRAZO</label><input type="date" id="m-prazo" value="'+esc(d.prazo||'')+'"></div>'
    +'<div class="modal-field"><label>DESCRIÇÃO</label><textarea id="m-desc" placeholder="Detalhes da demanda...">'+esc(d.descricao||'')+'</textarea></div>'
    +'<div class="modal-actions"><button class="btn-ghost" onclick="fecharModalNova()">Cancelar</button><button class="btn-save" onclick="salvarNova()">'+nBtn+'</button></div>'
    +'</div></div>';
}

// preserva os campos digitados antes de re-renderizar (o dropdown re-renderiza a cada clique)
function _capturarCamposModal(){
  var t=document.getElementById('m-titulo'); if(t)state.modalData.titulo=t.value;
  var p=document.getElementById('m-prio'); if(p)state.modalData.prioridade=p.value;
  var pz=document.getElementById('m-prazo'); if(pz)state.modalData.prazo=pz.value;
  var ds=document.getElementById('m-desc'); if(ds)state.modalData.descricao=ds.value;
}

async function salvarNova(){
  _capturarCamposModal();
  var titulo=(state.modalData.titulo||'').trim();
  if(!titulo){ showToast('Informe o título'); return; }
  var sel=state.modalData.responsaveis||[];
  if(sel.length===0){ showToast('Selecione ao menos um responsável'); return; }
  var base={
    titulo:titulo,
    prioridade:state.modalData.prioridade||'media',
    prazo:state.modalData.prazo||null,
    descricao:(state.modalData.descricao||'').trim(),
  };
  state.modalNova=false;
  showToast(sel.length>1?('Criando '+sel.length+' demandas...'):'Criando demanda...');
  // cria uma demanda separada por responsável.
  // __gestora__ vira uma demanda para_gestora (sem responsável de equipe).
  for(var i=0;i<sel.length;i++){
    var alvo=sel[i];
    var d;
    if(alvo==='__gestora__'){
      d=Object.assign({}, base, {responsavel:'gestora', para_gestora:true});
    }else{
      d=Object.assign({}, base, {responsavel:alvo, para_gestora:false});
    }
    await criarDemanda(d, true);
  }
  await carregarDemandas(); render();
}

// ---- MODAL DETALHE / TIMELINE ----
function abrirCard(id){ state.cardAberto=id; render(); }
function fecharCard(){ state.cardAberto=null; render(); }

// ---- MODAL EDITAR (só gestora) ----
function abrirModalEditar(id){
  var d=state.demandas.find(function(x){return x.id===id;});
  if(!d)return;
  state.cardAberto=null;
  state.editData={id:d.id, titulo:d.titulo, responsavel:d.responsavel, prioridade:d.prioridade, prazo:d.prazo||'', descricao:d.descricao||''};
  render();
}
function fecharModalEditar(){ state.editData=null; render(); }
function renderModalEditar(){
  var d=state.editData;
  var respOpts=funcionarias().map(function(f){return'<option value="'+f+'"'+(d.responsavel===f?' selected':'')+'>'+esc(u(f).nome)+'</option>';}).join('');
  var prioOpts=Object.keys(PRIORIDADES).map(function(p){return'<option value="'+p+'"'+(d.prioridade===p?' selected':'')+'>'+PRIORIDADES[p]+'</option>';}).join('');
  return '<div class="modal-overlay" onclick="if(event.target===this)fecharModalEditar()"><div class="modal">'
    +'<div class="modal-title">Editar demanda</div>'
    +'<div class="modal-field"><label>TÍTULO</label><input type="text" id="e-titulo" value="'+esc(d.titulo||'')+'"></div>'
    +'<div class="modal-field"><label>RESPONSÁVEL</label><select id="e-resp">'+respOpts+'</select></div>'
    +'<div class="modal-field"><label>PRIORIDADE</label><select id="e-prio">'+prioOpts+'</select></div>'
    +'<div class="modal-field"><label>PRAZO</label><input type="date" id="e-prazo" value="'+esc(d.prazo||'')+'"></div>'
    +'<div class="modal-field"><label>DESCRIÇÃO</label><textarea id="e-desc">'+esc(d.descricao||'')+'</textarea></div>'
    +'<div class="modal-actions"><button class="btn-ghost" onclick="fecharModalEditar()">Cancelar</button><button class="btn-save" onclick="salvarEdicao()">Salvar alterações</button></div>'
    +'</div></div>';
}
async function salvarEdicao(){
  var d=state.editData;
  var titulo=document.getElementById('e-titulo').value.trim();
  if(!titulo){ showToast('Informe o título'); return; }
  var novoResp=document.getElementById('e-resp').value;
  var atual=state.demandas.find(function(x){return x.id===d.id;});
  var respMudou = atual && atual.responsavel!==novoResp;
  var patch={
    titulo:titulo,
    responsavel:novoResp,
    prioridade:document.getElementById('e-prio').value,
    prazo:document.getElementById('e-prazo').value||null,
    descricao:document.getElementById('e-desc').value.trim(),
    atualizado_em:new Date().toISOString()
  };
  await sb.from('demandas').update(patch).eq('id',d.id);
  if(respMudou){
    await logHistorico(d.id,'edicao', u(atual.responsavel).nome, u(novoResp).nome);
  }else{
    await logHistorico(d.id,'edicao', null, null);
  }
  state.editData=null;
  showToast('Demanda atualizada');
  await carregarDemandas(); render();
}

function renderModalCard(){
  var d=state.demandas.find(function(x){return x.id===state.cardAberto;});
  if(!d){ return ''; }
  var user=u(d.responsavel);
  var isGestora=state.role==='gestora';
  var hist=state.historico.filter(function(h){return h.demanda_id===d.id;});
  var tl=hist.map(function(h){
    var txt = h.tipo==='criada' ? 'Demanda criada' :
              h.tipo==='status' ? 'Status: '+h.de+' → '+h.para :
              h.tipo==='validacao' ? 'Validação: '+h.para :
              h.tipo==='quadro' ? 'Movida: '+h.de+' → '+h.para :
              h.tipo==='edicao' ? (h.de&&h.para ? 'Demanda editada · responsável: '+h.de+' → '+h.para : 'Demanda editada') : h.para;
    return '<div class="tl-item"><div class="tl-dot"></div><div><div class="tl-text">'+esc(txt)+'</div><div class="tl-time">'+fmtDataHora(h.em)+' · '+esc(u(h.autor).nome)+'</div></div></div>';
  }).join('') || '<div class="tl-text" style="font-size:12px;color:var(--text3)">Sem histórico ainda.</div>';

  var statusInfo = '<span class="prio-badge" style="background:rgba(255,255,255,.06);color:'+STATUS[d.status].cor+'">'+STATUS[d.status].label+'</span>';
  if(d.enviada){
    if(d.validacao==='ludmila'){
      statusInfo += ' <span class="valid-badge valid-validada">✓ Validada pela Ludmila</span>';
      if(d.validado_rafael) statusInfo += ' <span class="valid-badge valid-rafael">✓ Rafael</span>';
    }else{
      statusInfo += ' <span class="valid-badge valid-aguardando">⏳ Aguardando validação</span>';
    }
  }

  // Editar: gestora OU a funcionária dona da demanda. Excluir: só gestora.
  var podeEditar = isGestora || (state.role==='funcionaria' && d.responsavel===state.usuario);
  var btnExcluir = isGestora ? '<button class="btn-danger" onclick="excluirDemanda(\''+d.id+'\')">Excluir</button>' : '';
  var btnEditar = podeEditar ? '<button class="btn-edit" onclick="abrirModalEditar(\''+d.id+'\')">Editar</button>' : '';

  return '<div class="modal-overlay" onclick="if(event.target===this)fecharCard()"><div class="modal">'
    +'<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px">'
      +'<div class="modal-title" style="margin:0">'+esc(d.titulo)+'</div>'
      +'<span class="prio-badge prio-'+d.prioridade+'">'+PRIORIDADES[d.prioridade].toUpperCase()+'</span>'
    +'</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px">'+statusInfo+'</div>'
    +'<div style="font-size:12px;font-family:var(--mono);color:var(--text3);margin-bottom:6px">RESPONSÁVEL</div>'
    +'<div style="margin-bottom:14px"><span class="kanban-card-autor" style="background:'+user.corBg+';color:'+user.cor+'"><span class="avatar" style="background:'+user.cor+';color:#0f1117">'+iniciais(user.nome)+'</span>'+esc(user.nome)+'</span></div>'
    +(d.prazo?'<div style="font-size:12px;font-family:var(--mono);color:var(--text3);margin-bottom:6px">PRAZO</div><div style="margin-bottom:14px;font-size:13px">📅 '+fmtData(d.prazo)+'</div>':'')
    +(d.descricao?'<div style="font-size:12px;font-family:var(--mono);color:var(--text3);margin-bottom:6px">DESCRIÇÃO</div><div style="margin-bottom:14px;font-size:13px;color:var(--text2);line-height:1.5">'+esc(d.descricao)+'</div>':'')
    +'<div class="section-title" style="margin-top:8px">HISTÓRICO</div><div class="timeline">'+tl+'</div>'
    +'<div class="modal-actions">'+btnExcluir+btnEditar+'<button class="btn-ghost" onclick="fecharCard()">Fechar</button></div>'
    +'</div></div>';
}

function bindApp(){ /* eventos inline já ligados via onclick */ }

// ============================================================
// INIT
// ============================================================
render();
</script>
